<!DOCTYPE html>
<html><head><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Lead Impression Calculator</title>
<link rel='manifest' href='manifest.json'>
<script>
function calc(){
  var lp1=parseFloat(document.getElementById('lp1').value)||0;
  var lp2=parseFloat(document.getElementById('lp2').value)||0;
  [1,2,3].forEach(i=>{
    var p=parseFloat(document.getElementById('p'+i).value)||0;
    document.getElementById('d1_'+i).value=(p-lp1).toFixed(3);
    document.getElementById('d2_'+i).value=(p-lp2).toFixed(3);
  });
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}
</script>
</head><body>
<h2>Lead Impression Calculator</h2>
<label>Lead Pin No 1</label><input id='lp1' oninput='calc()'>
<label>Lead Pin No 2</label><input id='lp2' oninput='calc()'>
<h3>Plug Row 1</h3><input id='p1' oninput='calc()'><label>Difference No 1</label><input id='d1_1' readonly><label>Difference No 2</label><input id='d2_1' readonly><h3>Plug Row 2</h3><input id='p2' oninput='calc()'><label>Difference No 1</label><input id='d1_2' readonly><label>Difference No 2</label><input id='d2_2' readonly><h3>Plug Row 3</h3><input id='p3' oninput='calc()'><label>Difference No 1</label><input id='d1_3' readonly><label>Difference No 2</label><input id='d2_3' readonly></body></html>
