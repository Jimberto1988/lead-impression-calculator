<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lead Impression Calculator</title>
manifest.json

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #d9ecff; /* Light Blue */
        margin: 0;
    }

    h2 {
        text-align: center;
        margin-top: 0;
        font-size: 1.8rem;
        color: #003366;
    }

    h3 {
        color: #003366;
        margin-top: 25px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 12px;
        color: #003366;
    }

    /* Updated input field width for mobile */
    input {
        width: 90%;
        max-width: 420px;
        padding: 10px;
        margin-top: 6px;
        font-size: 1.05rem;
        border-radius: 8px;
        border: 1px solid #7bb6e0;
        background: #ffffffdd;
        box-shadow: inset 0 0 3px #00000022;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    /* Updated block width for mobile friendliness */
    .block {
        width: 92%;
        max-width: 480px;
        background: #ffffffee;
        padding: 16px;
        border-radius: 12px;
        margin: 18px auto;
        box-shadow: 0 2px 8px #00000033;
    }

    .btn {
        width: 92%;
        max-width: 480px;
        display: block;
        margin: 22px auto;
        padding: 14px;
        background: #005bb5;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.2rem;
        cursor: pointer;
        box-shadow: 0 3px 8px #00000033;
        text-align: center;
    }

    .btn:hover { background: #004a92; }
</style>

<script>
// ----------------------------
// AUTO CALCULATE
// ----------------------------
function calc() {
    const lp1 = parseFloat(document.getElementById('pin1').value) || 0;
    const lp2 = parseFloat(document.getElementById('pin2').value) || 0;

    for (let i = 1; i <= 3; i++) {
        const so = parseFloat(document.getElementById(`standoff${i}`).value) || 0;
        document.getElementById(`d1_${i}`).value = (so - lp1).toFixed(3);
        document.getElementById(`d2_${i}`).value = (so - lp2).toFixed(3);
    }

    saveData();
}

// ----------------------------
// AUTO SAVE LOCAL STORAGE
// ----------------------------
function saveData() {
    const data = {
        pin1: pin1.value,
        pin2: pin2.value,
        standoff1: standoff1.value,
        standoff2: standoff2.value,
        standoff3: standoff3.value
    };
    localStorage.setItem("leadCalcData", JSON.stringify(data));
}

function loadData() {
    const saved = JSON.parse(localStorage.getItem("leadCalcData"));
    if (!saved) return;

    pin1.value = saved.pin1 || "";
    pin2.value = saved.pin2 || "";
    standoff1.value = saved.standoff1 || "";
    standoff2.value = saved.standoff2 || "";
    standoff3.value = saved.standoff3 || "";

    calc();
}

// ----------------------------
// EXPORT CSV
// ----------------------------
function exportCSV() {
    const rows = [
        ["Row", "Standoff", "Diff #1", "Diff #2"],
        ["1", standoff1.value, d1_1.value, d2_1.value],
        ["2", standoff2.value, d1_2.value, d2_2.value],
        ["3", standoff3.value, d1_3.value, d2_3.value]
    ];

    let csv = rows.map(r => r.join(",")).join("\n");

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "Lead_Impression_Data.csv";
    a.click();
    URL.revokeObjectURL(url);
}

// ----------------------------
// ENABLE SERVICE WORKER
// ----------------------------
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}

window.onload = loadData;

</script>
</head>

<body>

<h2>Lead Impression Calculator</h2>

<!-- PIN INPUTS -->
<label>Pin #1</label>
<input id="pin1" oninput="calc()">

<label>Pin #2</label>
<input id="pin2" oninput="calc()">

<h3>Mandrel:</h3>

<!-- STANDOFF 1 -->
<div class="block">
    <label>Standoff #1</label>
    <input id="standoff1" oninput="calc()">

    <label>Diff #1</label>
    <input id="d1_1" readonly>

    <label>Diff #2</label>
    <input id="d2_1" readonly>
</div>

<!-- STANDOFF 2 -->
<div class="block">
    <label>Standoff #2</label>
    <input id="standoff2" oninput="calc()">

    <label>Diff #1</label>
    <input id="d1_2" readonly>

    <label>Diff #2</label>
    <input id="d2_2" readonly>
</div>

<!-- STANDOFF 3 -->
<div class="block">
    <label>Standoff #3</label>
    <input id="standoff3" oninput="calc()">

    <label>Diff #1</label>
    <input id="d1_3" readonly>

    <label>Diff #2</label>
    <input id="d2_3" readonly>
</div>

<button class="btn" onclick="exportCSV()">Export CSV</button>

</body>
</html>
